<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Commit Narrator - Web UI</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <div class="container">
      <section class="hero">
        <h1>AI Commit Narrator</h1>
        <p>把 Git 提交转成可读发布说明、风险提示与回滚建议。支持 Markdown / JSON 和可选 LLM 摘要。</p>
      </section>

      <section class="layout">
        <form class="card grid" id="narrateForm">
          <h2>参数配置</h2>

          <div class="field">
            <label for="repo">仓库路径</label>
            <input id="repo" value=".." placeholder="例如 .. 或 D:\\repo" />
          </div>

          <div class="inline">
            <div class="field">
              <label for="since">开始日期</label>
              <input id="since" placeholder="2026-03-01" />
            </div>
            <div class="field">
              <label for="until">结束日期</label>
              <input id="until" placeholder="2026-03-04" />
            </div>
          </div>

          <div class="field">
            <label for="commits">提交 SHA（逗号分隔）</label>
            <textarea id="commits" placeholder="a1b2c3,d4e5f6"></textarea>
          </div>

          <div class="inline">
            <div class="field">
              <label for="fromTag">起始 Tag</label>
              <input id="fromTag" placeholder="v0.1.0" />
            </div>
            <div class="field">
              <label for="toTag">结束 Tag</label>
              <input id="toTag" placeholder="v0.2.0" />
            </div>
          </div>

          <div class="inline">
            <div class="field">
              <label for="maxCount">最大提交数</label>
              <input id="maxCount" value="30" />
            </div>
            <div class="field">
              <label for="lang">语言</label>
              <select id="lang">
                <option value="zh">中文</option>
                <option value="en">English</option>
              </select>
            </div>
          </div>

          <div class="inline">
            <div class="field">
              <label for="format">输出格式</label>
              <select id="format">
                <option value="both">both</option>
                <option value="markdown">markdown</option>
                <option value="json">json</option>
              </select>
            </div>
            <div class="field">
              <label for="llmModel">LLM 模型（可选）</label>
              <input id="llmModel" value="gpt-4o-mini" />
            </div>
          </div>

          <div class="field">
            <label><input type="checkbox" id="withLlm" /> 启用 LLM 执行摘要（需设置 OPENAI_API_KEY）</label>
          </div>

          <button id="submitBtn" type="submit">生成报告</button>
          <div class="muted">提示：`from-tag` 与 `to-tag` 必须成对填写；也可直接填 commits。</div>
          <div id="errorBox" class="err"></div>
        </form>

        <div class="grid">
          <section class="card">
            <h2>执行结果</h2>
            <div class="summary">
              <div class="kpi"><div class="muted">Commits</div><div class="num" id="kpiCommits">0</div></div>
              <div class="kpi"><div class="muted">Risks</div><div class="num" id="kpiRisks">0</div></div>
              <div class="kpi"><div class="muted">Format</div><div class="num" id="kpiFormat">-</div></div>
              <div class="kpi"><div class="muted">LLM</div><div class="num" id="kpiLlm">off</div></div>
            </div>
          </section>

          <section class="card">
            <div class="panel-head">
              <h2>Markdown 预览</h2>
              <div class="actions"><button type="button" id="copyMd">复制</button></div>
            </div>
            <pre id="markdownOutput"></pre>
          </section>

          <section class="card">
            <div class="panel-head">
              <h2>JSON 预览</h2>
              <div class="actions"><button type="button" id="copyJson">复制</button></div>
            </div>
            <pre id="jsonOutput"></pre>
          </section>
        </div>
      </section>
    </div>

    <script src="/assets/app.js"></script>
  </body>
</html>
